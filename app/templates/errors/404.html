{% extends "layout.html" %}
{% block title %}Página no encontrada — RestaurantPro{% endblock %}
{% block header_title %}Error 404{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5">
    <h1 class="display-1 fw-bold text-muted mb-3">404</h1>
    <p class="lead text-secondary mb-4">La página que buscas no existe o fue movida.</p>
    <a href="{{ url_for('dashboard.index') if current_user.role == 'admin' else url_for('tables.monitor') }}" class="btn btn-primary px-4 py-2">
        <i class="bi bi-house-door me-2"></i>Volver al inicio
    </a>
</div>
{% endblock %}
